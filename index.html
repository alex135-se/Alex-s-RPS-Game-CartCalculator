
<!DOCTYPE html>

<html>

  <head>
    <link rel="stylesheet" href="10-dom-projects.css">
    <link rel="icon" type="image/png" href="RPS-Game-icons/image-icon.jfif".png>


    <title>DOM Projetcs (CSS)</title>

  </head>

  <body> 
    <p>YouTube Subscribe Button</p>
    <button onclick="
         subscribe()
        " class="js-subscribe-button subscribe-button">Subscribe</button>
 
    <p style="
        margin-top: 60px;
     ">Amazon Shipping Calculator
    </p>

    <p style="
      margin-bottom: 20px;
      ">Orders Under $40 = +$10 shipping.
    </p>
    <p>Orders over $40 = FREE shipping.</p>

   <input class="js-customerCost-input" type="text" placeholder="Cost of order" onkeydown="
         calculateWithEnterKeydown(event)     ">

   <button class="calculate-button" onclick="
        calculateTotal();
   ">Calculate</button>

   <p class="js-totalCost"></p>

   <p class="rps-game-label">Rock Paper Scissors Game</p>

   <a class="rps-game-link" href="10-rock-paper-scissors css.html"><u>Click here</u></a>


    <script>
      function subscribe() {
        const buttonElement = document.querySelector('.js-subscribe-button');

        if (buttonElement.innerText === 'Subscribe') {
            buttonElement.innerText = 'Subscribed';
            buttonElement.classList.add('is-subscribed');
        } else {
          buttonElement.innerText = 'Subscribe'; 
          buttonElement.classList.remove('is-subscribed');
        }
      }
    
     function calculateTotal () {
        const inputElement = document.querySelector('.js-customerCost-input');

        let customerCost = Number(inputElement.value);

        if (customerCost < 40) {
          customerCost = customerCost + 10; 
        } 

        document.querySelector('.js-totalCost').innerHTML = `$${customerCost}`;
     }

    function calculateWithEnterKeydown(event) {
       if (event.key === 'Enter') {
          calculateTotal();
      };
    }
    
    </script>
    
  </body>    
</html>
