<!DOCTYPE html>

<html>

<head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="RPS-Game.css">
    <link rel="icon" type="image/png" href="RPS-Game-icons/image-icon.jfif".png>
</head>

<body>
    <!--'Math.random'; this code generates a random # btn 0 and 1-->

    <p class="game-title"> Rock Paper Scissors </p>

    <!--Rock button-->
    <button class="move-button" onclick="
       playGame('Rock');
    "> <img class="move-icon" src="RPS-Game-icons/rock-emoji.png" alt=""></button>

    <!--Paper button-->
    <button class="move-button" onclick="
        playGame('Paper'); 
    "><img class="move-icon" src="RPS-Game-icons/paper-emoji.png" alt=""></button>

    <!--Scissorsbutton-->
    <button class="move-button" onclick="
        playGame('Scissors');  
    "> <img class="move-icon" src="RPS-Game-icons/scissors-emoji.png" alt=""></button>

    <p class="js-result result"></p>

    <p class="js-moves moves">   </p>
 
    <p class="js-score score"></p>

    <button class="reset-score-button" style="display: block;
                   margin-bottom: 40px;
    " onclick="
          score.wins = 0;
          score.losses = 0;
          score.ties = 0;
          localStorage.removeItem('score');
          updateScoreElement();
    
    ">Reset Score </button>

    <a href="10-dom-projects-css.html">Return</a>

    <script>
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            ties: 0
        } // using a default operator
    
        updateScoreElement();


        /*
    if (!score) {
        score = {
            wins: 0,
            losses: 0,
            ties: 0
        }
    } */

        // function to get player's move
        function playGame(playerMove) {
            const computerMove = pickComputerMove();
           
            let result = '';

            //function for Scissors
            if (playerMove === 'Scissors') {
                if (computerMove === 'Rock') {
                    result = 'You lose.';
                }
                else if (computerMove === 'Paper') {
                    result = 'You win.';
                }
                else if (computerMove === 'Scissors') {
                    result = 'Tie.';
                }
            }
     
            //function for Paper
            else if (playerMove === 'Paper') {
                if (computerMove === 'Paper') {
                    result = 'Tie.';
                }
                else if (computerMove === 'Scissors') {
                    result = 'You lose.';
                }
                else if (computerMove === 'Rock') {
                    result = 'You win.';
                }
            }

            //function for Rock
            else if (playerMove === 'Rock') {
                if (computerMove === 'Rock') {
                    result = 'Tie.';
                }
                else if (computerMove === 'Paper') {
                    result = 'You lose.';
                }
                else if (computerMove === 'Scissors') {
                    result = 'You win.';
                }
            }

            if (result === 'You win.') {
                score.wins += 1;
            } else if (result === 'You lose.') {
                score.losses += 1;
            } else if (result === 'Tie.') {
                score.ties += 1;
            }

            localStorage.setItem('score', JSON.stringify(score)); //sets an item in a local storage

            updateScoreElement();

            document.querySelector('.js-result').innerHTML = result;

            document.querySelector('.js-moves').innerHTML = `You
            <img class="move-icon" src="RPS-Game-icons/${playerMove}-emoji.png" alt="">
            <img class="move-icon" src="RPS-Game-icons/${computerMove}-emoji.png" alt="">
            Computer`;
            }
        
        function updateScoreElement() {
              document.querySelector('.js-score')
                .innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
        }

        function pickComputerMove() {
            const randomNumber = Math.random();
            let computerMove = '';
            if (randomNumber >= 0 && randomNumber < (1 / 3)) {
                computerMove = 'Rock';
            }
            else if (randomNumber >= (1 / 3) && randomNumber < (2 / 3)) {
                computerMove = 'Paper';
            }
            else if (randomNumber >= (2 / 3) && randomNumber < 1) {
                computerMove = 'Scissors';
            }

            return computerMove;
        }
    </script>

</body>

</html>
